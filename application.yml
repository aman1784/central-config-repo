management:
  tracing:
    sampling:
      probability: 1.0 # 1.0 means 100% of requests are sent to Zipkin (Great for dev, usually 0.1 in Prod)
  zipkin:
    tracing:
      endpoint: "http://localhost:9411/api/v2/spans"

# Enable Observation for Feign and Kafka in Spring Boot 3
spring:
  cloud:
    openfeign:
      micrometer:
        enabled: true
  kafka:
    listener:
      observation-enabled: true
    template:
      observation-enabled: true