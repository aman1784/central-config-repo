server:
  port: 8081

spring:
  application:
    name: auth-service

  datasource:
    url: jdbc:mysql://localhost:3306/auth_db
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
    
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # This will help to insert the data.sql data if tables are empty, though it will run everytime but data.sql script wil insert 
  # only if data is not present.
  sql:
    init:
      mode: always

eureka:
  instance:
    prefer-ip-address: true
    hostname: localhost

jwt:
  secret: 50caab1114b4d2550f2713a933d9c58e2348f88e426a9e0cf8e954924b64f862
  expiration: 300000 # 5 mins